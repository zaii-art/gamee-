<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLAPPY I.N — STRAY KIDS EDITION</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height:100%;
    background:#0a0612;
    overflow:hidden;
    font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    user-select:none;
  }
  #wrap {
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at 50% 20%, #2a1640 0%, #0a0612 70%);
  }
  #gameCanvas {
    display:block;
    image-rendering: pixelated;
    box-shadow: 0 0 0 4px #c9a85c, 0 0 40px rgba(201,168,92,0.6), 0 0 90px rgba(255,255,255,0.08);
    border-radius: 4px;
    max-width: 100vw;
    max-height: 100vh;
  }
  #hint {
    position:fixed;
    bottom:10px;
    left:0; right:0;
    text-align:center;
    color:#c9a85c;
    font-size:11px;
    letter-spacing:2px;
    opacity:0.6;
    font-family: monospace;
    pointer-events:none;
  }
  #muteBtn {
    position:absolute;
    top:14px;
    right:14px;
    width:38px;
    height:38px;
    border-radius:50%;
    border:2px solid #c9a85c;
    background:rgba(10,6,18,0.55);
    color:#f0d28a;
    font-size:17px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:5;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  #muteBtn:hover { background:rgba(54,68,58,0.8); }
  #muteBtn:active { transform: scale(0.92); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>
  <button id="muteBtn" aria-label="Toggle music">🔊</button>
</div>
<div id="hint">TAP / CLICK / SPACE TO FLY</div>

<script>
(function(){
"use strict";

// ---------- Canvas Setup ----------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const BASE_W = 400, BASE_H = 650;
canvas.width = BASE_W;
canvas.height = BASE_H;

function fitCanvas(){
  const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H, 1.6);
  canvas.style.width = (BASE_W*scale)+'px';
  canvas.style.height = (BASE_H*scale)+'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ---------- Audio Engine (synth-generated, no external files) ----------
let audioCtx = null;
let masterGain = null;
let musicGain = null;
let sfxGain = null;
let musicTimer = null;
let musicStep = 0;
let muted = false;

function ensureAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 1;
  masterGain.connect(audioCtx.destination);

  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.22;
  musicGain.connect(masterGain);

  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.35;
  sfxGain.connect(masterGain);
}

function playTone(freq, time, dur, type, gainNode, vol){
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, time);
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(vol, time + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.connect(g);
  g.connect(gainNode);
  osc.start(time);
  osc.stop(time + dur + 0.02);
}

function playKick(time){
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.15);
  g.gain.setValueAtTime(0.8, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
  osc.connect(g);
  g.connect(musicGain);
  osc.start(time);
  osc.stop(time + 0.25);
}

function playSubBoom(time, dur){
  // long 808-style sub hit for trap feel
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(95, time);
  osc.frequency.exponentialRampToValueAtTime(38, time + dur*0.6);
  g.gain.setValueAtTime(0.7, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.connect(g);
  g.connect(musicGain);
  osc.start(time);
  osc.stop(time + dur + 0.02);
}

function playStab(freq, time, dur, vol){
  // aggressive distorted-style synth stab using detuned saws + waveshaping
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  const shaper = audioCtx.createWaveShaper();

  const curve = new Float32Array(256);
  for(let i=0;i<256;i++){
    const x = (i/255)*2-1;
    curve[i] = Math.tanh(x*3.2); // soft clip distortion
  }
  shaper.curve = curve;
  shaper.oversample = '2x';

  osc1.type = 'sawtooth';
  osc2.type = 'sawtooth';
  osc1.frequency.setValueAtTime(freq, time);
  osc2.frequency.setValueAtTime(freq*1.008, time); // slight detune for thickness

  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(vol, time + 0.008);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);

  osc1.connect(shaper);
  osc2.connect(shaper);
  shaper.connect(g);
  g.connect(musicGain);

  osc1.start(time); osc1.stop(time+dur+0.02);
  osc2.start(time); osc2.stop(time+dur+0.02);
}

function playHat(time, vol){
  const bufferSize = audioCtx.sampleRate * 0.04;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const g = audioCtx.createGain();
  g.gain.value = vol;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 7000;
  src.connect(hp);
  hp.connect(g);
  g.connect(musicGain);
  src.start(time);
}

// Original aggressive trap-influenced chiptune loop — minor key, hard kick/sub,
// syncopated stabs, and a hi-hat roll for that high-energy K-pop-adjacent drop feel.
// (Entirely original notes/rhythm — not based on any existing song.)
const BASS_NOTES = [110.00, 110.00, 130.81, 110.00, 98.00, 98.00, 116.54, 110.00]; // A minor-ish, punchy
const STAB_NOTES = [
  440.00, 0,      523.25, 0,        // A5 .  C6 .
  392.00, 0,      440.00, 523.25,   // G5 .  A5  C6
  466.16, 0,      440.00, 0,        // Bb5 . A5  .
  392.00, 349.23, 0,      440.00    // G5  F5  .  A5
]; // 0 = rest, creates syncopated stutter-stab pattern

const STEP_DUR = 0.135; // faster, harder-hitting tempo
const STEPS_PER_BAR = 16;

function scheduleMusicStep(){
  if(!audioCtx || muted) return;
  const t = audioCtx.currentTime + 0.05;
  const stepInBar = musicStep % STEPS_PER_BAR;
  const barCount = Math.floor(musicStep / STEPS_PER_BAR);

  // distorted stab melody - syncopated, with rests for punch
  const note = STAB_NOTES[stepInBar];
  if(note > 0){
    playStab(note, t, STEP_DUR*0.9, 0.11);
  }

  // bass - every 2 steps, minor key movement
  if(stepInBar % 2 === 0){
    const bassNote = BASS_NOTES[(stepInBar/2 | 0) % BASS_NOTES.length];
    playTone(bassNote, t, STEP_DUR*1.8, 'sawtooth', musicGain, 0.10);
  }

  // hard kick on 0, 6, 8, 10 (trap-style syncopation)
  if(stepInBar === 0 || stepInBar === 6 || stepInBar === 8 || stepInBar === 10){
    playKick(t);
  }
  // sub boom on the downbeat of every other bar for weight
  if(stepInBar === 0 && barCount % 2 === 0){
    playSubBoom(t, STEP_DUR*3.5);
  }
  // snare-ish hat burst on 4, 12
  if(stepInBar === 4 || stepInBar === 12){
    playHat(t, 0.22);
  }
  // hi-hat roll building into bar end (15th & 16th steps doubled feel)
  if(stepInBar === 14 || stepInBar === 15){
    playHat(t, 0.16);
    playHat(t + STEP_DUR*0.5, 0.12);
  } else {
    playHat(t, 0.045);
  }

  musicStep++;
}

function startMusic(){
  ensureAudio();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  stopMusic();
  musicStep = 0;
  scheduleMusicStep();
  musicTimer = setInterval(scheduleMusicStep, STEP_DUR*1000);
}

function stopMusic(){
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
}

function playFlapSfx(){
  ensureAudio();
  if(muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(420, t);
  osc.frequency.exponentialRampToValueAtTime(720, t + 0.08);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(g);
  g.connect(sfxGain);
  osc.start(t);
  osc.stop(t + 0.14);
}

function playScoreSfx(){
  ensureAudio();
  if(muted) return;
  const t = audioCtx.currentTime;
  playTone(880, t, 0.1, 'square', sfxGain, 0.18);
  playTone(1318.5, t+0.05, 0.12, 'square', sfxGain, 0.16);
}

function playCrashSfx(){
  ensureAudio();
  if(muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.5);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  osc.connect(g);
  g.connect(sfxGain);
  osc.start(t);
  osc.stop(t + 0.6);
}

function toggleMute(){
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  if(muted){
    if(masterGain) masterGain.gain.value = 0;
    btn.textContent = '🔇';
  } else {
    ensureAudio();
    masterGain.gain.value = 1;
    btn.textContent = '🔊';
    if(state === STATE.PLAYING || state === STATE.MENU){
      if(!musicTimer) startMusic();
    }
  }
}

document.getElementById('muteBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  toggleMute();
});

// ---------- Game States ----------
const STATE = { MENU:0, PLAYING:1, GAMEOVER:2 };
let state = STATE.MENU;

// ---------- Colors / Theme (Bottega Veneta deep green + gold, K-pop neon accents) ----------
const PALETTE = {
  bvGreen: "#36443a",
  bvGreenLight: "#4a5d4f",
  gold: "#c9a85c",
  goldBright: "#f0d28a",
  neonPink: "#ff5fae",
  neonCyan: "#3ff0ff",
  skyTop: "#7ec8e3",
  skyBottom: "#ffd9ec",
};

// ---------- Background (Mario-style parallax) ----------
let clouds = [];
let hills = [];
let groundOffset = 0;

function initBackground(){
  clouds = [];
  for(let i=0;i<6;i++){
    clouds.push({
      x: Math.random()*BASE_W,
      y: 40 + Math.random()*140,
      s: 0.6 + Math.random()*0.8,
      speed: 0.15 + Math.random()*0.15
    });
  }
  hills = [];
  for(let i=0;i<5;i++){
    hills.push({
      x: i * 160,
      h: 60 + Math.random()*40
    });
  }
}
initBackground();

function drawCloud(x,y,scale){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.beginPath();
  ctx.arc(0,0,16,0,Math.PI*2);
  ctx.arc(18,-6,14,0,Math.PI*2);
  ctx.arc(34,0,16,0,Math.PI*2);
  ctx.arc(18,8,18,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBackground(dt){
  // sky gradient - sunset kpop pastel
  const g = ctx.createLinearGradient(0,0,0,BASE_H);
  g.addColorStop(0, PALETTE.skyTop);
  g.addColorStop(0.55, "#bfe3f0");
  g.addColorStop(1, PALETTE.skyBottom);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,BASE_W,BASE_H);

  // distant hills (parallax, mario-style rolling hills)
  ctx.fillStyle = "#8fd99a";
  for(const h of hills){
    let hx = h.x - (groundOffset*0.3 % 800);
    if(hx < -200) hx += 800;
    ctx.beginPath();
    ctx.arc(hx, BASE_H-90, h.h, Math.PI, 0);
    ctx.fill();
  }

  // clouds
  for(const c of clouds){
    c.x -= c.speed * dt;
    if(c.x < -60) c.x = BASE_W + 60;
    drawCloud(c.x, c.y, c.s);
  }

  // gold sparkle stars (kpop stage vibe)
  ctx.fillStyle = "rgba(240,210,138,0.5)";
  for(let i=0;i<14;i++){
    const sx = (i*53 + (groundOffset*0.5)) % BASE_W;
    const sy = (i*97) % 260;
    ctx.fillRect(sx, sy, 2, 2);
  }
}

// ---------- Ground (Bottega Veneta woven pattern strip) ----------
const GROUND_H = 70;
function drawGround(){
  const y = BASE_H - GROUND_H;
  ctx.fillStyle = PALETTE.bvGreen;
  ctx.fillRect(0, y, BASE_W, GROUND_H);

  // woven intrecciato-style diagonal pattern
  ctx.strokeStyle = "rgba(240,210,138,0.25)";
  ctx.lineWidth = 3;
  const off = groundOffset % 24;
  for(let x=-24; x<BASE_W+24; x+=24){
    ctx.beginPath();
    ctx.moveTo(x - off, y);
    ctx.lineTo(x - off + 24, y + GROUND_H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - off + 24, y);
    ctx.lineTo(x - off, y + GROUND_H);
    ctx.stroke();
  }

  // gold top edge
  ctx.fillStyle = PALETTE.gold;
  ctx.fillRect(0, y, BASE_W, 6);
  ctx.fillStyle = PALETTE.goldBright;
  ctx.fillRect(0, y, BASE_W, 2);
}

// ---------- Player (Ship) ----------
const player = {
  x: 90,
  y: BASE_H/2,
  vy: 0,
  w: 52,
  h: 30,
  rot: 0
};

const GRAVITY = 1500;
const FLAP_VY = -420;
const MAX_FALL = 600;

function resetPlayer(){
  player.x = 90;
  player.y = BASE_H/2;
  player.vy = 0;
  player.rot = 0;
}

function flap(){
  if(state === STATE.PLAYING){
    player.vy = FLAP_VY;
    playFlapSfx();
  } else if(state === STATE.MENU){
    // ignore, handled by menu buttons
  } else if(state === STATE.GAMEOVER){
    // ignore, handled by buttons
  }
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.rot);
  if(shipReady){
    ctx.drawImage(shipImg, -player.w/2, -player.h/2, player.w, player.h);
  } else {
    ctx.fillStyle = PALETTE.neonPink;
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
  }
  ctx.restore();
}

// ---------- Pipes (styled as gold-trimmed BV columns) ----------
let pipes = [];
const PIPE_W = 60;
const PIPE_GAP = 168;
let pipeTimer = 0;
const PIPE_INTERVAL = 1.5;
let pipeSpeed = 160;

function spawnPipe(){
  const margin = 60;
  const usable = BASE_H - GROUND_H - margin*2 - PIPE_GAP;
  const topH = margin + Math.random()*usable;
  pipes.push({ x: BASE_W + PIPE_W, topH: topH, passed:false });
}

function drawPipe(p){
  const groundY = BASE_H - GROUND_H;
  const bottomY = p.topH + PIPE_GAP;

  // top pipe
  drawColumn(p.x, 0, PIPE_W, p.topH, true);
  // bottom pipe
  drawColumn(p.x, bottomY, PIPE_W, groundY - bottomY, false);
}

function drawColumn(x,y,w,h,isTop){
  if(h<=0) return;
  // body
  const grd = ctx.createLinearGradient(x,0,x+w,0);
  grd.addColorStop(0, PALETTE.bvGreenLight);
  grd.addColorStop(0.5, PALETTE.bvGreen);
  grd.addColorStop(1, "#2a352e");
  ctx.fillStyle = grd;
  ctx.fillRect(x,y,w,h);

  // gold trim lines
  ctx.fillStyle = PALETTE.gold;
  ctx.fillRect(x, y, 4, h);
  ctx.fillRect(x+w-4, y, 4, h);

  // cap
  ctx.fillStyle = PALETTE.gold;
  const capH = 16;
  if(isTop){
    ctx.fillRect(x-5, y+h-capH, w+10, capH);
    ctx.fillStyle = PALETTE.goldBright;
    ctx.fillRect(x-5, y+h-capH, w+10, 3);
  } else {
    ctx.fillRect(x-5, y, w+10, capH);
    ctx.fillStyle = PALETTE.goldBright;
    ctx.fillRect(x-5, y+capH-3, w+10, 3);
  }
}

function resetPipes(){
  pipes = [];
  pipeTimer = 0;
}

// ---------- Score ----------
let score = 0;
let best = 0;
try {
  const stored = localStorage_safe_get();
  if(stored) best = stored;
} catch(e){}

function localStorage_safe_get(){
  // localStorage may be unavailable in some embeds; guard it
  try {
    const v = window.localStorage.getItem('flappybv_best');
    return v ? parseInt(v,10) : 0;
  } catch(e){ return 0; }
}
function localStorage_safe_set(v){
  try { window.localStorage.setItem('flappybv_best', String(v)); } catch(e){}
}

// ---------- Collision ----------
function checkCollision(){
  const groundY = BASE_H - GROUND_H;
  if(player.y + player.h/2 > groundY) return true;
  if(player.y - player.h/2 < 0) { player.y = player.h/2; player.vy = 0; }

  const pw = player.w*0.6, ph = player.h*0.6;
  const px0 = player.x - pw/2, px1 = player.x + pw/2;
  const py0 = player.y - ph/2, py1 = player.y + ph/2;

  for(const p of pipes){
    const inX = px1 > p.x && px0 < p.x + PIPE_W;
    if(inX){
      const bottomY = p.topH + PIPE_GAP;
      if(py0 < p.topH || py1 > bottomY) return true;
    }
  }
  return false;
}

// ---------- UI Buttons ----------
function makeBtn(x,y,w,h,label){
  return {x,y,w,h,label};
}

let menuButtons = {
  start: makeBtn(BASE_W/2-80, 380, 160, 50, "START"),
  exit: makeBtn(BASE_W/2-80, 445, 160, 50, "EXIT")
};
let gameOverButtons = {
  retry: makeBtn(BASE_W/2-80, 430, 160, 46, "RETRY"),
  menu: makeBtn(BASE_W/2-80, 485, 160, 46, "MENU")
};

function pointInRect(px,py,r){
  return px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h;
}

// ---------- Title Text Effects ----------
let titlePulse = 0;

function drawTitle(){
  titlePulse += 0.05;
  const pulse = Math.sin(titlePulse)*4;

  ctx.save();
  ctx.textAlign = "center";

  // "FLAPPY" - gold luxury
  ctx.font = "900 38px Arial Black, sans-serif";
  ctx.lineWidth = 6;
  ctx.strokeStyle = PALETTE.bvGreen;
  ctx.fillStyle = PALETTE.gold;
  ctx.strokeText("FLAPPY I.N", BASE_W/2, 130 + pulse*0.3);
  ctx.fillText("FLAPPY I.N", BASE_W/2, 130 + pulse*0.3);

  // "STRAY KIDS" smaller
  ctx.font = "900 22px Arial Black, sans-serif";
  ctx.lineWidth = 4;
  ctx.strokeStyle = "#1c241f";
  ctx.fillStyle = "#ffffff";
  ctx.strokeText("STRAY KIDS", BASE_W/2, 162);
  ctx.fillText("STRAY KIDS", BASE_W/2, 162);

  // neon "EDITION"
  ctx.font = "900 26px Arial Black, sans-serif";
  ctx.lineWidth = 5;
  ctx.strokeStyle = "#3a0a2a";
  const grad = ctx.createLinearGradient(BASE_W/2-100,0,BASE_W/2+100,0);
  grad.addColorStop(0, PALETTE.neonPink);
  grad.addColorStop(1, PALETTE.neonCyan);
  ctx.fillStyle = grad;
  ctx.strokeText("✦ EDITION ✦", BASE_W/2, 200 + pulse*0.5);
  ctx.fillText("✦ EDITION ✦", BASE_W/2, 200 + pulse*0.5);

  ctx.restore();
}

function drawButton(btn, hovered){
  ctx.save();
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(btn.x+3, btn.y+4, btn.w, btn.h);

  const grad = ctx.createLinearGradient(btn.x, btn.y, btn.x, btn.y+btn.h);
  if(hovered){
    grad.addColorStop(0, PALETTE.goldBright);
    grad.addColorStop(1, PALETTE.gold);
  } else {
    grad.addColorStop(0, PALETTE.gold);
    grad.addColorStop(1, "#a8854a");
  }
  ctx.fillStyle = grad;
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);

  ctx.strokeStyle = PALETTE.bvGreen;
  ctx.lineWidth = 3;
  ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);

  ctx.fillStyle = PALETTE.bvGreen;
  ctx.font = "900 22px Arial Black, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(btn.label, btn.x+btn.w/2, btn.y+btn.h/2+2);
  ctx.restore();
}

// floating decorative ship preview on menu
let menuShipBob = 0;

function drawMenu(){
  drawTitle();

  // decorative ship floating
  menuShipBob += 0.04;
  const by = 280 + Math.sin(menuShipBob)*10;
  ctx.save();
  ctx.translate(BASE_W/2, by);
  if(shipReady){
    ctx.drawImage(shipImg, -45, -26, 90, 52);
  }
  ctx.restore();

  drawButton(menuButtons.start, false);
  drawButton(menuButtons.exit, false);

  // best score
  ctx.fillStyle = "#3a2a10";
  ctx.font = "bold 16px monospace";
  ctx.textAlign = "center";
  ctx.fillText("BEST: " + best, BASE_W/2, 545);
}

function drawHUD(){
  ctx.save();
  ctx.font = "900 44px Arial Black, sans-serif";
  ctx.textAlign = "center";
  ctx.lineWidth = 5;
  ctx.strokeStyle = PALETTE.bvGreen;
  ctx.fillStyle = "#ffffff";
  ctx.strokeText(score, BASE_W/2, 70);
  ctx.fillText(score, BASE_W/2, 70);
  ctx.restore();
}

function drawGameOver(){
  ctx.save();
  ctx.fillStyle = "rgba(10,6,18,0.55)";
  ctx.fillRect(0,0,BASE_W,BASE_H);

  ctx.textAlign = "center";
  ctx.font = "900 36px Arial Black, sans-serif";
  ctx.lineWidth = 5;
  ctx.strokeStyle = PALETTE.bvGreen;
  ctx.fillStyle = PALETTE.gold;
  ctx.strokeText("GAME OVER", BASE_W/2, 260);
  ctx.fillText("GAME OVER", BASE_W/2, 260);

  ctx.font = "bold 22px Arial, sans-serif";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("SCORE: " + score, BASE_W/2, 310);
  ctx.fillText("BEST: " + best, BASE_W/2, 340);

  drawButton(gameOverButtons.retry, false);
  drawButton(gameOverButtons.menu, false);
  ctx.restore();
}

// ---------- Input ----------
function handlePointer(clientX, clientY){
  ensureAudio();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  if(!musicTimer && state !== STATE.GAMEOVER && !muted) startMusic();

  const rect = canvas.getBoundingClientRect();
  const scaleX = BASE_W / rect.width;
  const scaleY = BASE_H / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;

  if(state === STATE.MENU){
    if(pointInRect(x,y,menuButtons.start)){
      startGame();
    } else if(pointInRect(x,y,menuButtons.exit)){
      exitGame();
    }
  } else if(state === STATE.PLAYING){
    flap();
  } else if(state === STATE.GAMEOVER){
    if(pointInRect(x,y,gameOverButtons.retry)){
      startGame();
    } else if(pointInRect(x,y,gameOverButtons.menu)){
      state = STATE.MENU;
    }
  }
}

canvas.addEventListener('mousedown', (e)=>{
  handlePointer(e.clientX, e.clientY);
});
canvas.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  handlePointer(t.clientX, t.clientY);
}, {passive:false});

window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){
    e.preventDefault();
    ensureAudio();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    if(!musicTimer && state !== STATE.GAMEOVER && !muted) startMusic();
    if(state === STATE.PLAYING) flap();
    else if(state === STATE.MENU) startGame();
    else if(state === STATE.GAMEOVER) startGame();
  }
});

function exitGame(){
  // In a browser context we can't force-close a tab opened by the user directly (security restriction),
  // so show a friendly exit screen instead.
  stopMusic();
  state = EXIT_STATE;
}
const EXIT_STATE = 3;

function drawExitScreen(){
  drawBackground(0);
  drawGround();
  ctx.save();
  ctx.fillStyle = "rgba(10,6,18,0.7)";
  ctx.fillRect(0,0,BASE_W,BASE_H);
  ctx.textAlign = "center";
  ctx.font = "900 30px Arial Black, sans-serif";
  ctx.fillStyle = PALETTE.gold;
  ctx.fillText("THANKS FOR PLAYING", BASE_W/2, 300);
  ctx.font = "bold 18px Arial, sans-serif";
  ctx.fillStyle = "#fff";
  ctx.fillText("You may close this tab.", BASE_W/2, 335);

  const backBtn = makeBtn(BASE_W/2-80, 380, 160, 46, "BACK");
  drawButton(backBtn, false);
  window._exitBackBtn = backBtn;
  ctx.restore();
}

// patch pointer handler for exit screen back button
const origHandlePointer = handlePointer;
function handlePointer2(clientX, clientY){
  if(state === EXIT_STATE && window._exitBackBtn){
    const rect = canvas.getBoundingClientRect();
    const scaleX = BASE_W / rect.width;
    const scaleY = BASE_H / rect.height;
    const x = (clientX - rect.left) * scaleX;
    const y = (clientY - rect.top) * scaleY;
    if(pointInRect(x,y,window._exitBackBtn)){
      state = STATE.MENU;
      return;
    }
    return;
  }
  origHandlePointer(clientX, clientY);
}
canvas.removeEventListener('mousedown', ()=>{});
canvas.addEventListener('mousedown', (e)=>{ handlePointer2(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', (e)=>{
  const t = e.touches[0];
  handlePointer2(t.clientX, t.clientY);
}, {passive:false});

function startGame(){
  state = STATE.PLAYING;
  resetPlayer();
  resetPipes();
  score = 0;
  pipeSpeed = 160;
  startMusic();
}

// ---------- Main Loop ----------
let lastTime = performance.now();

function update(dt){
  if(state === STATE.PLAYING){
    player.vy += GRAVITY * dt;
    if(player.vy > MAX_FALL) player.vy = MAX_FALL;
    player.y += player.vy * dt;
    player.rot = Math.max(-0.5, Math.min(1.1, player.vy / 500));

    pipeTimer += dt;
    if(pipeTimer >= PIPE_INTERVAL){
      pipeTimer = 0;
      spawnPipe();
    }

    for(const p of pipes){
      p.x -= pipeSpeed * dt;
      if(!p.passed && p.x + PIPE_W < player.x){
        p.passed = true;
        score++;
        playScoreSfx();
      }
    }
    pipes = pipes.filter(p => p.x > -PIPE_W - 10);

    groundOffset += pipeSpeed * dt;

    if(checkCollision()){
      state = STATE.GAMEOVER;
      stopMusic();
      playCrashSfx();
      if(score > best){
        best = score;
        localStorage_safe_set(best);
      }
    }
  } else {
    groundOffset += 40 * dt;
  }
}

function render(dt){
  if(state === EXIT_STATE){
    drawExitScreen();
    return;
  }

  drawBackground(dt);
  drawGround();

  if(state === STATE.MENU){
    drawMenu();
  } else if(state === STATE.PLAYING){
    for(const p of pipes) drawPipe(p);
    drawPlayer();
    drawHUD();
  } else if(state === STATE.GAMEOVER){
    for(const p of pipes) drawPipe(p);
    drawPlayer();
    drawHUD();
    drawGameOver();
  }
}

function loop(now){
  const dt = Math.min(0.033, (now - lastTime)/1000);
  lastTime = now;
  update(dt);
  render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
